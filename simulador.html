<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas Andinas - Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    <script src="funciones.js"></script>
    <script src="simulador.js"></script>
    <style>
        /* Estilos integrados para el branding del encabezado */
        .header-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            padding-top: 20px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            fill: #2e1a47; /* Morado corporativo profundo */
        }

        .brand-name {
            font-family: 'Segoe UI', sans-serif;
            text-align: left;
            line-height: 1;
        }

        .brand-name h2 {
            margin: 0;
            padding: 0;
            border: none;
            color: #2e1a47;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .brand-name p {
            margin: 0;
            padding: 0;
            border: none;
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Clase para los mensajes de validación */
        .error-msg {
            color: #d32f2f;
            font-size: 12px;
            font-weight: bold;
            display: block;
            margin-top: 5px;
            min-height: 15px;
        }
    </style>
</head>
<body>

    <div class="header-logo">
        <svg class="logo-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 17.66l6-10.66 4 7 4-11 4 14.66h-18zm11-1.66l-2-3.5-3 5.33h10l-2-7-3 5.17z"/>
        </svg>
        <div class="brand-name">
            <h2>Finanzas</h2>
            <p>Andinas</p>
        </div>
    </div>
    
    <div class="container">
        <h1>Simulador de Crédito</h1>

        <h2>Datos financieros</h2>
        
        <label for="txtIngresos">Ingresos mensuales:</label>
        <input type="text" id="txtIngresos" placeholder="Ej: 2500">
        <span id="errIngresos" class="error-msg"></span>

        <label for="txtEgresos">Egresos mensuales:</label>
        <input type="text" id="txtEgresos" placeholder="Ej: 1200">
        <span id="errEgresos" class="error-msg"></span>

        <p>Disponible: <span id="spnDisponible">$0.00</span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago">$0.00</span></p>

        <h2>Solicitud de crédito</h2>
        
        <label for="txtMonto">Monto solicitado:</label>
        <input type="text" id="txtMonto" placeholder="Mín: 500 - Máx: 50000">
        <span id="errMonto" class="error-msg"></span>

        <label for="txtPlazo">Plazo (años):</label>
        <input type="text" id="txtPlazo" placeholder="De 1 a 30 años">
        <span id="errPlazo" class="error-msg"></span>

        <label for="txtTasaInteres">Tasa de interés anual (%):</label>
        <input type="text" id="txtTasaInteres" placeholder="Ej: 12">
        <span id="errTasaInteres" class="error-msg"></span>

        <p>Interés total a pagar: <span id="spnInteresPagar">$0.00</span></p>
        <p>Total del préstamo: <span id="spnTotalPrestamo">$0.00</span></p>
        <p>Cuota mensual estimada: <span id="spnCuotaMensual">$0.00</span></p>
        
        <div style="margin-top: 20px; text-align: center;">
            <p style="justify-content: center; border: none; font-weight: bold;">Estado del crédito:</p>
            <span id="spnEstadoCredito" style="display: inline-block; margin-top: 5px;">ESPERANDO DATOS...</span>
        </div>

        <div class="buttons">
            <button id="btnCalcularCredito" onclick="calcular()">Calcular Crédito</button>
            <button id="btnReiniciar" onclick="reiniciar()">Reiniciar</button>
        </div>
    </div>

</body>
</html>
